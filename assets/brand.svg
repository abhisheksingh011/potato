<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="potatoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#9B3FDE"/>
      <stop offset="55%"  stop-color="#5B6FDE"/>
      <stop offset="100%" stop-color="#1ABC9C"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#1ABC9C"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" fill="url(#bgGrad)" rx="18"/>

  <!-- Subtle border -->
  <rect width="480" height="320" fill="none" stroke="#30363d" stroke-width="1" rx="18"/>

  <!-- Ambient glow behind potato -->
  <ellipse cx="240" cy="128" rx="88" ry="65" fill="#7B2FBE" opacity="0.18" filter="url(#softglow)"/>

  <!-- Potato body — organic silhouette -->
  <path d="M240 62
           C272 57 308 72 322 100
           C336 128 324 158 300 168
           C274 179 238 175 214 161
           C190 147 178 122 182 99
           C186 76 206 66 240 62 Z"
        fill="url(#potatoGrad)" filter="url(#glow)"/>

  <!-- Potato surface texture — subtle highlight -->
  <path d="M228 72 C252 66 278 72 292 86 C300 94 300 104 292 110 C278 118 252 116 236 108 C222 100 218 86 228 72 Z"
        fill="rgba(255,255,255,0.07)"/>

  <!-- Architecture nodes on the potato (circuit dot pattern) -->
  <circle cx="262" cy="96"  r="5" fill="rgba(255,255,255,0.80)"/>
  <circle cx="296" cy="118" r="4" fill="rgba(255,255,255,0.60)"/>
  <circle cx="230" cy="122" r="4" fill="rgba(255,255,255,0.60)"/>
  <circle cx="258" cy="148" r="3.5" fill="rgba(255,255,255,0.50)"/>
  <circle cx="307" cy="144" r="3"   fill="rgba(255,255,255,0.40)"/>
  <circle cx="210" cy="104" r="3"   fill="rgba(255,255,255,0.40)"/>

  <!-- Connector lines between nodes -->
  <line x1="262" y1="96"  x2="296" y2="118" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="262" y1="96"  x2="230" y2="122" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="296" y1="118" x2="258" y2="148" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="122" x2="258" y2="148" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="296" y1="118" x2="307" y2="144" stroke="rgba(255,255,255,0.20)" stroke-width="1"   stroke-linecap="round"/>
  <line x1="230" y1="122" x2="210" y2="104" stroke="rgba(255,255,255,0.20)" stroke-width="1"   stroke-linecap="round"/>

  <!-- Brand name -->
  <text x="240" y="228"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800"
        fill="url(#titleGrad)"
        text-anchor="middle"
        letter-spacing="-2">Potato</text>

  <!-- Thin divider line -->
  <line x1="80" y1="244" x2="400" y2="244" stroke="#30363d" stroke-width="1"/>

  <!-- Tagline -->
  <text x="240" y="272"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500"
        fill="#6e7681"
        text-anchor="middle"
        letter-spacing="5">THE CLOUD ARCHITECTURE STUDIO</text>
</svg>
