  "playFlow": [
    { "arrow": "a_1",  "text": "The bank's own policy and procedure documents (.txt / .md / .pdf) enter the ingestion pipeline, which loads each file and splits it into character-span-aware chunks — so that every answer Citadel later gives can be traced back to the exact passage it came from." },
    { "arrow": "a_2",  "text": "The ingestion pipeline embeds each chunk with a local sentence-transformer model and writes the vectors into the Vector Store (ChromaDB in the reference build; a managed pgvector or Qdrant index in production). The index is built once, offline, so query time stays fast and cheap." },
    { "arrow": "a_3",  "text": "At query time a compliance analyst submits a plain-English regulatory question. The Retriever embeds that question with the same model used at ingestion, so the query and the documents live in the same vector space and are directly comparable." },

    { "arrow": "a_6",  "text": "The reranked passages are handed to the Grounded Prompt builder as numbered sources, preserving their character spans so each one can be cited as [Source N] and later audited against the original document." },
    { "arrow": "a_7",  "text": "The prompt builder assembles a strict grounding prompt — the numbered sources plus hard instructions to answer using ONLY those sources, cite every claim, and otherwise refuse — and sends it to Anthropic's Claude. Critically, the Ledger wraps this call from the outside." },
    { "arrow": "a_8",  "text": "Claude (claude-sonnet-4-6) returns a draft answer that either cites [Source N] for each factual claim, or opens with the NOT_COVERED: marker when the sources don't contain the answer. The Citation Enforcement stage receives this raw output and does not trust it yet." },
    { "arrow": "a_9",  "text": "Citation Enforcement verifies that every [Source N] maps to a real retrieved source (catching hallucinated citations), flags any factual sentence lacking a citation, and computes citation coverage — producing either a fully-cited answer or a structured refusal, never an unsupported guess." },
    { "arrow": "a_10", "text": "The cited answer or refusal is surfaced to a Human Reviewer, who approves, rejects, or edits it — keeping a person accountable for any decision the institution acts on, exactly as model-risk governance requires." },
    { "arrow": "a_11", "text": "Throughout, the Ledger captures the Claude call from the outside: it records the question, retrieved sources, the model name and the API-returned model version, token counts, estimated cost, and latency into one immutable AuditRecord — written even if the call raises, because failures must be auditable too. (Dotted = monitoring.)" },
    { "arrow": "a_12", "text": "Citation Enforcement logs the final outcome — the answer, parsed citations, coverage score, and whether the system refused and why — into the same AuditRecord, so the safety behavior itself is on the record and replayable months later. (Dotted = monitoring.)" },
    { "arrow": "a_13", "text": "When the Human Reviewer files a disposition, the Ledger appends a NEW version of the record with only the reviewer fields populated, never mutating the machine's original decision — so an auditor can see both what the model decided and what the human did about it as two distinct facts. (Dashed = asynchronous human step.)" },
