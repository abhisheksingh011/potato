name: check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    name: index.html parses + generated data is in sync

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 1. The inline <script> block in index.html must parse as valid JS.
      #    A surprising number of regressions are unterminated template literals
      #    or stray `</script` substrings inside strings, both of which silently
      #    truncate the script when the browser parses the HTML.
      - name: Parse the inline script in index.html
        run: |
          node -e "
            const fs = require('fs');
            const h = fs.readFileSync('index.html', 'utf8');
            const m = h.match(/<script>\s*\n\/\/ ====[\s\S]+?<\/script>/);
            if (!m) { console.error('Could not find the main <script> block'); process.exit(1); }
            const body = m[0].replace(/^<script>/, '').replace(/<\/script>\$/, '');
            try {
              new Function(body);
              console.log('OK:', body.split(String.fromCharCode(10)).length, 'lines parsed');
            } catch (e) {
              console.error('Parse failure:', e.message);
              process.exit(1);
            }
          "

      # 2. service_kb.json must be valid JSON.
      - name: Validate service_kb.json
        run: node -e "JSON.parse(require('fs').readFileSync('service_kb.json', 'utf8')); console.log('service_kb.json is valid JSON');"

      # 3. Re-run the generators. If they would change index.html, the committed
      #    state is out of sync with the source files (service_kb.json or icons/).
      #    Fail with a helpful message telling the contributor what to do.
      - name: Re-run generators and check for drift
        run: |
          node _generate_kb.js
          node _generate_components.js
          if ! git diff --exit-code -- index.html; then
            echo ""
            echo "::error::index.html is out of sync with service_kb.json and/or icons/."
            echo "Run these two commands locally and commit the regenerated index.html:"
            echo "  node _generate_kb.js"
            echo "  node _generate_components.js"
            exit 1
          fi

      # 4. The inline <script> embedded into saved .potato.html files must
      #    also parse. The buildSavedHTML function lives inside a template
      #    literal, so a stray `\n` in the editor source can collapse into a
      #    real newline inside the saved JS, breaking the entire viewer
      #    (play flow, tooltips, all of it). This check evaluates the
      #    template the same way the browser would and parses the result.
      - name: Saved-viewer script smoke test
        run: node _test_saved_viewer.js
